<!DOCTYPE html>
<html>

<head>
    <title>Payout Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #eef2f7;
            padding: 20px;
        }

        .dashboard {
            max-width: 1400px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h2 {
            font-size: 24px;
            color: #111827;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 9px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 6px 10px;
            background: white;
        }

        .search {
            border: none;
            outline: none;
            min-width: 180px;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        th,
        td {
            border: 1px solid #e5e7eb;
            padding: 6px 4px;
            text-align: center;
            font-size: 14px;
        }

        th {
            background: #111827;
            color: white;
            position: sticky;
            padding: 8px 4px !important;

            top: 0;
        }

        tr:nth-child(even) {
            background: #f9fafb;
        }

        tr:hover {
            background: #eef2ff;
        }

        #countRow {
            margin-bottom: 10px;
            font-weight: 600;
            color: #374151;
        }

        @media(max-width:768px) {

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                width: 100%;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

        }
    </style>

</head>

<body>

    <div class="dashboard">

        <h1 style="text-align: center;">Nisar Bhaijaan Dashboard</h1>

        <div class="header">

            <h2>
                <!-- Header Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="#2563eb" viewBox="0 0 24 24">
                    <path d="M2 6h20v12H2zM2 10h20" />
                </svg>
                Payout Dashboard
            </h2>

        </div>

        <div class="controls">

            <!-- Upload Button -->
            <label class="btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="white" viewBox="0 0 24 24">
                    <path d="M5 20h14v-2H5m14-9h-4V3H9v6H5l7 7 7-7z" />
                </svg>
                Upload Excel
                <input type="file" id="excelFile" accept=".xlsx,.xls,.csv">
            </label>

            <!-- Submit -->
            <button class="btn" onclick="processFile()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="white" viewBox="0 0 24 24">
                    <path d="M2 21l21-9L2 3v7l15 2-15 2z" />
                </svg>
                Submit
            </button>

            <!-- Search -->
            <div class="search-box">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#6b7280" viewBox="0 0 24 24">
                    <path
                        d="M9.5 3A6.5 6.5 0 1 0 16 9.5a6.5 6.5 0 0 0-6.5-6.5zm0 11A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14zm11 6-5.2-5.2" />
                </svg>
                <input class="search" id="search" placeholder="Search payout">
            </div>

            <!-- Export -->
            <button class="btn" onclick="exportExcel()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="white" viewBox="0 0 24 24">
                    <path d="M5 20h14v-2H5m7-14-5.5 5.5 1.42 1.42L11 8.84V16h2V8.84l3.08 3.08 1.42-1.42L12 4z" />
                </svg>
                Export Excel
            </button>

        </div>

        <div id="countRow"></div>

        <div class="table-container">

            <table id="payoutTable">

                <thead id="tableHead"></thead>

                <tbody id="tableBody">
                    <tr>
                        <td>Upload Excel and click Submit</td>
                    </tr>
                </tbody>

            </table>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
