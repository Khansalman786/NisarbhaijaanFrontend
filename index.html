<!DOCTYPE html>
<html>

<head>

    <title>Payout Dashboard</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Segoe UI, Roboto, Arial;
        }

        body {
            background: #f3f6fb;
            margin: 0;
            padding: 30px;
        }

        .dashboard {
            max-width: 1400px;
            margin: auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            padding: 25px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            color: #333;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .search {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            width: 260px;
        }

        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }

        .btn:hover {
            background: #1e4fd1;
        }

        .table-container {
            overflow: auto;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #111827;
            color: white;
            padding: 10px;
            text-align: left;
            position: sticky;
            top: 0;
            text-wrap: nowrap;
            border: 1px solid white;
            text-align: center;
        }

        td {
            padding: 8px 4px;
            text-wrap: nowrap;
            border: 1px solid rgb(45, 45, 45);
            text-align: center;
        }

        tr:hover {
            background: #f7f9fc;
        }

        .status-success {
            background: #e7f7ee;
            color: #15803d;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-failed {
            background: #fde8e8;
            color: #b91c1c;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .loader {
            text-align: center;
            padding: 40px;
            font-size: 16px;
            color: #777;
        }
    </style>

</head>

<body>

    <div class="dashboard">

        <div class="header">

            <div class="title">💳 Payout Dashboard</div>

            <div class="controls">
                <input type="file" id="csv" >

                <input class="search" type="text" id="search" placeholder="Search payoutId">

                <button class="btn" onclick="exportExcel()">Export Excel</button>

            </div>

        </div>

        <div class="table-container">

            <table id="payoutTable">

                <thead id="tableHead"></thead>

                <tbody id="tableBody">

                    <tr>
                        <td colspan="20" class="loader">Loading payout data...</td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
