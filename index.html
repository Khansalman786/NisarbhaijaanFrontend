<!DOCTYPE html>
<html>

<head>
    <title>Payout Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f3f6fb;
            padding: 30px;
        }

        .dashboard {
            max-width: 1400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        .search {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #111827;
            color: white;
        }
    </style>

</head>

<body>

    <div class="dashboard">

        <h2>💳 Payout Dashboard</h2>

        <div class="controls">

            <input type="file" id="excelFile" accept=".xlsx,.xls,.csv">

            <button class="btn" onclick="processFile()">Submit</button>

            <input class="search" id="search" placeholder="Search">

            <button class="btn" onclick="exportExcel()">Export Excel</button>

        </div>

        <div id="countRow" style="margin-bottom:8px;font-weight:bold"></div>
        <table id="payoutTable">

            <thead id="tableHead"></thead>

            <tbody id="tableBody">
                <tr>
                    <td>Upload Excel and click Submit</td>
                </tr>
            </tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>

</html>
